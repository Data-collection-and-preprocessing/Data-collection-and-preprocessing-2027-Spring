project:
  type: book
  output-dir: docs  # 关键：指定输出到 docs 文件夹以适配 GitHub Pages
  render:
    - "*.qmd"
    - "slides/*.qmd"

execute:
  freeze: auto

bibliography: references.bib

book:
  title: "数据采集与预处理"
  subtitle: "生态学数据采集与预处理方法指南"
  author: "Huaqing Liu"
  date: now
  
  
  chapters:
    - index.qmd
    - part: "第一单元：绪论与环境搭建"
      chapters:
        - 0101-what-is-data-collection.qmd
        - 0102-what-is-data-preprocessing.qmd
        - 0104-environment-setup.qmd
    - part: "第二单元：R 语言编程基础"
      chapters:
        - 0105-r-basics.qmd
        - 0106-r-data-wrangling.qmd
        - 0107-git-collaboration.qmd
    - part: "第三单元：数据采集方法"
      chapters:
        - 0201-data-collection-method.qmd
        - 0202-observation.qmd
        - 0203-experimentation.qmd
        - 0204-modeling.qmd
        - 0205-public-data.qmd
        - 0206-references.qmd
        - 0207-meta-analysis-intro.qmd
        - 0208-python-data-collection.qmd
    - part: "第四单元：数据预处理"
      chapters:
        - 0301-data-cleaning.qmd
        - 0302-feature-engineering.qmd
        - 0303-data-quality.qmd
    - part: "第五单元：数据可视化与探索性分析"
      chapters:
        - 0501-visualization-basics.qmd
        - 0502-eda.qmd
    - part: "第六单元：实战与项目"
      chapters:
        - 0601-case-study.qmd
        - 0602-project-workshop.qmd
        - 0603-summary.qmd
    - 010-references.qmd
format:
  html:
    theme: cosmo
    css: custom.css
    number-sections: true
    number-depth: 3
    toc: true          # 开启右侧页内目录 (Table of Contents)
    toc-depth: 3       # 目录深度
    toc-title: "本页内容" # 自定义目录标题
    fig-width: 7
    fig-asp: 0.618
    fig-align: center
    out-width: 100%
    warning: false
    message: false
    include-in-header:
        - ga.html
    include-after-body:
        - giscus.html
        - text: |
              <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
              <script async src="https://hypothes.is/embed.js"></script>
  # 核心：左侧导航栏配置
    sidebar:
      style: "docked"  # 固定在左侧 (docked) 
      search: true     # 开启搜索框
      collapse-level: 2 # 默认展开的层级
      
    # 页面布局优化
    grid:
      sidebar-width: 300px # 左侧栏宽度
      body-width: 900px    # 正文宽度
      margin-width: 300px  # 右侧目录栏宽度
      
    # 页脚 (可选)
    page-footer: 
      left: "Copyright 2026, Huaqing Liu"
      right: "Built with Quarto"
