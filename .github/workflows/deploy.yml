name: Deploy Quarto Book to gh-pages

on:
  push:
    branches: [main]
  workflow_dispatch:  # 允许手动触发


jobs:
  build-and-deploy:
    runs-on: macos-latest

    steps:
      # 检出代码仓库
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          lfs: true

      # 设置 Conda 环境
      - name: Set up Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          auto-activate: true
          miniconda-version: "latest"
          python-version: 3.10
          activate-environment: data-driven-reproducible-study
          environment-file: environment.yml

      - name: Set CONDA_DEFAULT_ENV
        run: |
          echo "CONDA_DEFAULT_ENV=data-driven-reproducible-study" >> $GITHUB_ENV
          echo "QUARTO_PYTHON=$CONDA/envs/data-driven-reproducible-study/bin/python" >> $GITHUB_ENV
          conda info

      # 安装 Quarto CLI
      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          Quarto: "1.6.0"

      # 构建 Quarto Book
      - name: Build Quarto Book
        uses: quarto-dev/quarto-actions/render@v2
        with:
          to: html

      # 部署到 gh-pages 分支
      - name: Publish to GitHub Pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          target: gh-pages
