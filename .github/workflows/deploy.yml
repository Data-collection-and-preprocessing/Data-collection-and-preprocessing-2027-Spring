name: Deploy Quarto Book to gh-pages

on:
  push:
    branches: [main]
  workflow_dispatch:  # 允许手动触发


jobs:
  build-and-deploy:
    runs-on: macos-latest

    steps:
      # 检出代码仓库
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          lfs: true

      # 安装 R（Quarto 需要 R 在系统路径中）
      - name: Install R and packages
        run: |
          brew install --cask r
          # 安装 Quarto 需要的 R 包（关键：reticulate 解决 Python chunk 问题）
          /Library/Frameworks/R.framework/Resources/Rscript -e '
            pkgs <- c("knitr", "rmarkdown", "reticulate", "tidyverse", "ggplot2", "dplyr", "tidyr")
            install.packages(pkgs, repos="https://cloud.r-project.org", quiet=TRUE)
          '

      # 设置 Conda 环境
      - name: Set up Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          auto-activate: true
          miniconda-version: "latest"
          python-version: 3.11
          activate-environment: data-driven-reproducible-study
          environment-file: environment.yml

      - name: Set CONDA_DEFAULT_ENV
        run: |
          echo "CONDA_DEFAULT_ENV=data-driven-reproducible-study" >> $GITHUB_ENV
          echo "QUARTO_PYTHON=$CONDA/envs/data-driven-reproducible-study/bin/python" >> $GITHUB_ENV
          conda info

      # 安装 Quarto CLI（直接下载，跳过 action 避免超时）
      - name: Set up Quarto
        run: |
          QUARTO_VERSION="1.4.312"
          curl -sL "https://github.com/quarto-dev/quarto/releases/download/v${QUARTO_VERSION}/quarto-${QUARTO_VERSION}-macos.tar.gz" | tar -xzf -
          echo "$(pwd)/quarto-${QUARTO_VERSION}/bin" >> $GITHUB_PATH
          quarto --version

      # 构建 Quarto Book
      - name: Build Quarto Book
        uses: quarto-dev/quarto-actions/render@v2
        with:
          to: html

      # 部署到 gh-pages 分支
      - name: Publish to GitHub Pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          QUARTO_PUB_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
